# Apache VirtualHost Configuration for Thunderbird Websites
# Generated from thundernest-ansible vars/apache.yml
# https://github.com/thunderbird/thundernest-ansible

# Global access log with vhost-prefixed format (combined/common already defined in httpd.conf)
LogFormat "%v: %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" vcombined
CustomLog "/dev/stdout" vcombined

ServerLimit 16
StartServers 4
MaxRequestWorkers 512
MinSpareThreads 16
MaxSpareThreads 64
ThreadsPerChild 32

AddType image/avif .avif
AddType image/jxl .jxl

AddOutputFilterByType DEFLATE text/plain
AddOutputFilterByType DEFLATE text/html
AddOutputFilterByType DEFLATE text/xml
AddOutputFilterByType DEFLATE text/css
AddOutputFilterByType DEFLATE application/xml
AddOutputFilterByType DEFLATE application/xhtml+xml
AddOutputFilterByType DEFLATE application/rss+xml
AddOutputFilterByType DEFLATE application/javascript
AddOutputFilterByType DEFLATE application/x-javascript

# When behind a load balancer with SSL termination, set HTTPS environment variable
# based on X-Forwarded-Proto header.
SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on

# SSL Configuration (commented out for container - SSL termination at load balancer)
# LoadModule ssl_module modules/mod_ssl.so
# Listen 443
# SSLPassPhraseDialog  builtin
# SSLSessionCache         shmcb:/var/cache/mod_ssl/scache(512000)
# SSLSessionCacheTimeout  300
# Mutex default
# SSLRandomSeed startup file:/dev/urandom  256
# SSLRandomSeed connect builtin
# SSLCryptoDevice builtin

# Runtime paths in /tmp work on both writable (Fargate) and read-only (Lambda) filesystems
WSGISocketPrefix /tmp/wsgi
ScriptSock /tmp/cgisock

# ============================================================================
# HTTP Virtual Hosts (Port 8080)
# SSL termination happens at the load balancer (Fargate) or API Gateway (Lambda).
# VirtualHosts with relative redirects use "https://" in ServerName so Apache
# generates correct self-referential URLs. See Apache docs:
# https://httpd.apache.org/docs/2.4/mod/core.html#servername
# ============================================================================

# Default virtual host for ALB health checks (must be first)
<VirtualHost *:8080>
  ServerName localhost
  DocumentRoot /var/www/html/start/www.thunderbird.net

  <Directory "/var/www/html/start/www.thunderbird.net">
    AllowOverride All
    Options -Indexes +FollowSymLinks
    Require all granted
  </Directory>
</VirtualHost>

# live.thunderbird.net
<VirtualHost *:8080>
  ServerName https://live.thunderbird.net
  ServerAlias live.mozillamessaging.com live-stage.thunderbird.net
  DocumentRoot /var/www/html/live.momo/htaccess/

  <Directory "/var/www/html/live.momo/htaccess/">
    AllowOverride All
    Options -Indexes +FollowSymLinks
    Require all granted
  </Directory>

  ExpiresActive On
  ExpiresDefault "access plus 6 hours"
</VirtualHost>

# autoconfig.thunderbird.net
<VirtualHost *:8080>
  ServerName https://autoconfig.thunderbird.net
  ServerAlias autoconfig-live.mozillamessaging.com autoconfig-stage.thunderbird.net
  DocumentRoot /var/www/html/autoconfig.momo/

  <Directory "/var/www/html/autoconfig.momo/">
    AllowOverride All
    Options +Indexes +FollowSymLinks
    Require all granted
  </Directory>

  <Location ~ "/v1\.1/">
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
    Header always set Access-Control-Max-Age "86400"
    ForceType text/xml
  </Location>

  ExpiresActive On
  ExpiresDefault "access plus 1 hour"
  Header always set Cache-Control "max-age=28800" "expr=%{REQUEST_STATUS} == 404"
  RewriteEngine On
  RewriteCond %{REQUEST_METHOD} OPTIONS
  RewriteRule ^ - [R=204,L]
  RewriteRule ^/autoconfig/(.*)$ /$1 [L,R=301,NE]
  Header always set Strict-Transport-Security "max-age=31536000"
</VirtualHost>

