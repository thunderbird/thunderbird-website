name: Build and Deploy
run-name: >-
  Deploy
  ${{ github.event.inputs.environment || github.event.action || (github.ref_name == 'prod' && 'prod') || 'stage' }}
  -
  ${{ github.event.client_payload.message || (github.event_name == 'push' && format('thunderbird-website {0} push', github.ref_name)) || 'manual deployment' }}

on:
  push:
    branches: [master, prod]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - stage
          - prod
  repository_dispatch:
    types: [stage, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.event.action || (github.ref_name == 'prod' && 'prod') || 'stage' }}
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || github.event.action || (github.ref_name == 'prod' && 'prod') || 'stage' }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || github.event.action || (github.ref_name == 'prod' && 'prod') || 'stage' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::768512802988:role/thunderbird-website-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BUILD_ENV: ${{ env.DEPLOY_ENV }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/thunderbird-website-$BUILD_ENV:$IMAGE_TAG"
          if [ "$BUILD_ENV" = "prod" ]; then REPO_BRANCH="prod"; else REPO_BRANCH="master"; fi
          docker build \
            -f docker/Dockerfile \
            --build-arg BUILD_ENV=$BUILD_ENV \
            --build-arg REPO_BRANCH=$REPO_BRANCH \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/thunderbird-website-$BUILD_ENV:latest \
            .
          docker push $IMAGE_URI
          docker push $ECR_REGISTRY/thunderbird-website-$BUILD_ENV:latest
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Publish to tb-website-builds
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
          TB_BUILDS_BRANCH: ${{ env.DEPLOY_ENV == 'prod' && 'prod' || 'master' }}
          BUILD_MESSAGE: ${{ github.event.client_payload.message || (github.event_name == 'push' && format('thunderbird-website {0} push.', github.ref_name)) || 'manual deployment.' }}
        run: |
          docker create --name extract $IMAGE_URI
          git clone --depth 1 --branch $TB_BUILDS_BRANCH \
            https://github.com/thunderbird/tb-website-builds.git \
            tb-website-builds
          cd tb-website-builds
          git remote set-url origin \
            https://x-access-token:${{ secrets.TB_BUILDS_KEY }}@github.com/thunderbird/tb-website-builds.git
          find . -maxdepth 1 ! -name '.git' ! -name 'README.md' ! -name '.' -exec rm -rf {} +
          docker cp extract:/var/www/html/start/. .
          git add -A
          git diff --cached --quiet || \
            git -c user.name="Thundernest Bot" -c user.email="${{ secrets.TB_BUILDS_GIT_EMAIL }}" \
              commit -m "Website rebuild triggered by $BUILD_MESSAGE"
          git push

      - name: Install uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7

      - name: Install Pulumi dependencies
        working-directory: ./pulumi
        run: uv sync --frozen

      # Authenticate with Pulumi Cloud via OIDC (no token secret needed)
      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@1c89817aab0c66407723cdef72b05266e7376640 # v1
        with:
          organization: thunderbird
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - name: Deploy infrastructure
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: up
          stack-name: thunderbird/thunderbird-website/${{ env.DEPLOY_ENV }}
          work-dir: ./pulumi
          refresh: true
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update ECS service
        env:
          BUILD_ENV: ${{ env.DEPLOY_ENV }}
        run: |
          aws ecs update-service \
            --cluster thunderbird-website-$BUILD_ENV \
            --service thunderbird-website-$BUILD_ENV \
            --force-new-deployment \
            --region $AWS_REGION
