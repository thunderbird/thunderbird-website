name: Build and Test Container

on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./docker/Dockerfile
          build-args: BUILD_ENV=local
          push: false
          load: true
          tags: thunderbird-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name tb-web-test thunderbird-web:test
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' tb-web-test 2>/dev/null)
            [ "$status" = "healthy" ] && break
            [ "$status" = "unhealthy" ] && docker logs tb-web-test && exit 1
            sleep 1
          done

      - name: Run all tests
        run: |
          docker exec tb-web-test sh -c "cd /build && uv run pytest tests/ -v"

      - name: Show container logs on failure
        if: failure()
        run: docker logs tb-web-test

      - name: Cleanup
        if: always()
        run: docker rm -f tb-web-test || true
