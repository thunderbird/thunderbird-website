<div id="tab-navigation-bar">
  <div class="tab-navigation-links">
    <a href="{{ settings.CANONICAL_URL }}" data-stage-url="{{ settings.CANONICAL_STAGE_URL }}">Thunderbird</a>
    <a href="{{ settings.CANONICAL_TBPRO_URL }}" class="active" data-stage-url="{{ settings.CANONICAL_TBPRO_STAGE_URL}}">Thunderbird Pro</a>
  </div>
</div>

<script>
  const PREFIX = /^www[.-]/;
  const stageHosts = {{ settings.STAGE_HOSTS|tojson|safe }};
  let roadmapsHosts = {{ settings.ROADMAPS_HOSTS|tojson|safe }};
  let wwwHosts = {{ settings.WWW_HOSTS|tojson|safe }};
  const currentHost = window.location.hostname.replace(PREFIX, '');
  const isStage = stageHosts.includes(currentHost);

  roadmapsHosts = roadmapsHosts.map((host) => host.replace(PREFIX, ''));
  wwwHosts = wwwHosts.map((host) => host.replace(PREFIX, ''));

  if (isStage) {
    // Replace with stage.* URLs
    document.querySelectorAll('#tab-navigation-bar a').forEach(link => {
      link.href = link.dataset.stageUrl;
    });
  }

  // Set .active class accordingly.
  document.querySelectorAll('#tab-navigation-bar a').forEach(link => {
    const linkHost = new URL(link.href).hostname.replace(PREFIX, '');
    const isRoadmaps = roadmapsHosts.includes(currentHost) && wwwHosts.includes(linkHost);

    // Highlight link for matching site.
    // Force-highlight www link for roadmaps site.
    if ((linkHost === currentHost) || isRoadmaps) {
      link.classList.add('active');
      link.addEventListener('click', (e) => {
        e.preventDefault();
      });
    } else {
      // Remove active class from other links
      link.classList.remove('active');
    }
  });
</script>
